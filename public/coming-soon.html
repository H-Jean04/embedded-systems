<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En cours de construction | Jean Dona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060c18;
      --cyan: #00e5ff;
      --green: #00ff88;
      --white: #f0f4ff;
      --muted: #5a7299;
      --border: rgba(0, 229, 255, 0.15);
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-display);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ---- CANVAS ---- */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.25;
    }

    /* ---- GLOW ---- */
    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 4s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    /* ---- CONTENT ---- */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 24px;
      max-width: 580px;
      animation: fadeUp 0.9s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- ICON ---- */
    .cs-icon {
      width: 80px; height: 80px;
      border-radius: 20px;
      background: rgba(0,229,255,0.06);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: iconSpin 6s linear infinite;
    }
    @keyframes iconSpin {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.2); }
      50% { box-shadow: 0 0 30px 6px rgba(0,229,255,0.15); }
    }

    /* ---- LABEL ---- */
    .cs-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--cyan);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .cs-label::before,
    .cs-label::after {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--cyan);
      opacity: 0.4;
    }

    /* ---- TITLE ---- */
    .cs-title {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }
    .cs-title span {
      background: linear-gradient(135deg, var(--cyan), #0077ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ---- DESCRIPTION ---- */
    .cs-desc {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 40px;
    }

    /* ---- PROGRESS ---- */
    .cs-progress {
      margin-bottom: 40px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .progress-pct {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--cyan);
      font-weight: 700;
    }
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--cyan), #0077ff);
      box-shadow: 0 0 12px rgba(0,229,255,0.4);
      animation: fillBar 1.5s 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes fillBar {
      to { width: var(--target-width); }
    }

    /* ---- CHIPS ---- */
    .cs-chips {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .chip {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.3px;
    }
    .chip .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: chipPulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes chipPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ---- BUTTONS ---- */
    .cs-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 26px;
      background: linear-gradient(135deg, var(--cyan), #0077ff);
      color: #000;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 24px rgba(0,229,255,0.2);
    }
    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(0,229,255,0.35);
    }
    .btn-contact {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 26px;
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-contact:hover {
      color: var(--cyan);
      border-color: var(--cyan);
      transform: translateY(-2px);
    }

    /* ---- FOOTER ---- */
    .cs-footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      z-index: 2;
    }
    .cs-footer a {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.3s;
    }
    .cs-footer a:hover { color: var(--cyan); }
    .cs-footer span { color: var(--cyan); }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
      .cs-actions { flex-direction: column; align-items: center; }
      .btn-back, .btn-contact { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <canvas id="cv"></canvas>
  <div class="glow"></div>

  <div class="content">

    <div class="cs-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
    </div>

    <div class="cs-label">En cours de préparation</div>

    <h1 class="cs-title">Ce contenu arrive<br/><span>bientôt</span></h1>

    <p class="cs-desc">
      Je travaille activement sur cette section.<br/>
      Revenez prochainement ou contactez-moi directement.
    </p>

    <!-- Barre de progression — modifie --target-width selon l'avancement réel -->
    <div class="cs-progress">
      <div class="progress-info">
        <span class="progress-label">AVANCEMENT</span>
        <span class="progress-pct" id="pct-label">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill" style="--target-width: 60%"></div>
      </div>
    </div>

    <div class="cs-chips">
      <div class="chip"><span class="dot"></span> Rédaction en cours</div>
      <div class="chip"><span class="dot"></span> Images à ajouter</div>
      <div class="chip"><span class="dot"></span> Mise en page finale</div>
    </div>

    <div class="cs-actions">
      <a href="index.html" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Retour à l'accueil
      </a>
      <a href="index.html#contact" class="btn-contact">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Me contacter
      </a>
    </div>

  </div>

  <div class="cs-footer">
    <a href="index.html"><span>&lt;</span>JD<span>/&gt;</span> — Jean Dona HOUEDOUGBE</a>
  </div>

  <script>
    // ---- CANVAS CIRCUIT ----
    const canvas = document.getElementById('cv');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const NODES = Array.from({ length: 20 }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      NODES.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,229,255,0.5)';
        ctx.fill();
      });
      for (let i = 0; i < NODES.length; i++) {
        for (let j = i + 1; j < NODES.length; j++) {
          const dx = NODES[i].x - NODES[j].x;
          const dy = NODES[i].y - NODES[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 180) {
            const a = (1 - dist / 180) * 0.25;
            ctx.beginPath();
            ctx.moveTo(NODES[i].x, NODES[i].y);
            const mx = (NODES[i].x + NODES[j].x) / 2;
            ctx.lineTo(mx, NODES[i].y);
            ctx.lineTo(mx, NODES[j].y);
            ctx.lineTo(NODES[j].x, NODES[j].y);
            ctx.strokeStyle = `rgba(0,229,255,${a})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();

    // ---- PROGRESS COUNTER ----
    const fill = document.getElementById('prog-fill');
    const label = document.getElementById('pct-label');
    const target = parseInt(getComputedStyle(fill).getPropertyValue('--target-width'));
    let current = 0;
    const interval = setInterval(() => {
      current += 1;
      label.textContent = current + '%';
      if (current >= target) clearInterval(interval);
    }, 1500 / target);
  </script>

</body>
</html>
